<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Room</title>
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f172a; --text:#e2e8f0; --muted:#94a3b8; --a1:#22d3ee; --a2:#a78bfa; --panel:rgba(255,255,255,.06); --panel-brd:rgba(255,255,255,.15); }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .wrap { max-width: 1100px; margin: 28px auto 48px; padding: 0 14px; }
    h1 { text-align:center; font-weight:800; letter-spacing:-.01em; margin-bottom:18px; }
    .card-pane { background: var(--panel); border: 1px solid var(--panel-brd); border-radius: 14px; padding: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 14px; }
    @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } }
    #chat-box { height: 58vh; overflow-y:auto; background: rgba(2,6,23,.35); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: .75rem; }
    .input-row { display:flex; gap:10px; margin-top:10px; width: 100%; }
    #chat-input { flex:1; border-radius:12px; border:1px solid rgba(255,255,255,.2); background:rgba(2,6,23,.45); color:var(--text); padding:10px 12px; min-height: 40px; }
    .footer-actions { text-align:right; margin-top: 12px; }
    .btn-next { background:linear-gradient(90deg,var(--a1),var(--a2)); border:0; border-radius:12px; padding:10px 16px; font-weight:700; color:#081223; }
    .btn-send { background:linear-gradient(90deg,var(--a1),var(--a2)); border:0; border-radius:12px; padding:10px 16px; font-weight:700; color:#081223; white-space: nowrap; }
    /* Suggested commands */
    .helper h5 { font-weight:700; margin-bottom:12px; }
    .helper .cmd { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:14px; color:var(--muted); cursor: pointer; transition: all 0.2s ease; width: 100%; text-align: left; line-height: 1.2; }
    .helper .cmd:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.25); color: var(--text); }
    .helper .cmd:active { transform: scale(0.98); }
    .helper-section { margin-bottom: 20px; }
    .helper-section h6 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--a1); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
    .card-pane.helper { padding: 15px; overflow-y: auto; max-height: 80vh; }
    /* agent-status */
    #agent-status { font-size:13px; color: var(--muted); margin-bottom: 10px; text-align: center; }
    #agent-status.ready { color: #4ade80; }
    #agent-status.connecting { color: #facc15; }
    /* Typing indicator */
    .typing-indicator { font-size: 13px; color: var(--muted); font-style: italic; padding: 4px 6px; display: none; }
    .typing-indicator.visible { display: block; }
    /* message base */
    .msg { margin-bottom: .75rem; font-size: 14px; line-height: 1.4; display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble { padding: 10px 12px; border-radius: 10px; word-wrap: break-word; overflow-wrap: break-word; width: fit-content; white-space: pre-wrap; }
    .msg-sender { font-weight: 700; font-size: 12px; color: var(--muted); padding: 0 2px; }
    /* user message - left side */
    .msg.user { align-items: flex-start; }
    .msg.user .msg-bubble { background-color: #ddf8c6; color: #081223; font-weight: 500; max-width: 80%; }
    /* agent message - right side */
    .msg.agent { align-items: flex-end; }
    .msg.agent .msg-bubble { background-color: #add8e6; color: #081223; font-weight: 500; max-width: 80%; }
    /* system message (warning, error, system) - center */
    .msg.system, .msg.warning, .msg.error { align-items: center; width: 100%; }
    .msg.system .msg-sender, .msg.warning .msg-sender, .msg.error .msg-sender { display: none; }
    .msg.system .msg-bubble, .msg.warning .msg-bubble, .msg.error .msg-bubble { max-width: 90%; text-align: center; font-style: italic; }
    /* System - Gray */
    .msg.system .msg-bubble { background-color: rgba(255,255,255,.08); color: var(--muted); font-size: 13px; }
    /* Warning - Yellow */
    .msg.warning .msg-bubble { background-color: #fff599; color: #663c00; border-left: 4px solid #facc15; }
    /* Error - Red */
    .msg.error .msg-bubble { background-color: #ea8a94; color: #fff; border-left: 4px solid #ef4444; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chat Room</h1>

    <!-- visual indicator of agent status -->
    <p id="agent-status" class="connecting">⏳ Connecting to agent…</p>

    <div class="grid">
      <div class="card-pane">
        <div id="chat-box" aria-live="polite"></div>

        <!-- Typing indicator: shown when agent is responding -->
        <div id="typing-indicator" class="typing-indicator">staychef is typing…</div>

        <!-- Message input section -->
        <div class="input-row">
          <input id="chat-input" type="text" placeholder="Type your message…" autocomplete="off">
          <button id="sendBtn" class="btn-send" disabled>Send</button>
        </div>

        <div class="footer-actions">
          <button id="continueBtn" class="btn-next" disabled>Continue</button>
        </div>
      </div>

      <aside id="commands-container" class="card-pane helper">
        <h5>Suggested Commands</h5>
        <div id="commands-dynamic-list">
            <p style="font-size: 12px; color: var(--muted);">Loading commands...</p>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>

  <script>
    // URL parameters extraction
    const u = new URL(window.location.href);
    const pid = u.searchParams.get('pid') || '';
    const order = u.searchParams.get('order') || 'route1';
    const nextUrl = u.searchParams.get('next') || '/';
    const currentPhase = u.searchParams.get('phase') || 'unknown';

    // Socket.IO client
    const socket = io()

    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('chat-input');
    const sendBtn = document.getElementById('sendBtn');
    const contBtn = document.getElementById('continueBtn');
    const agentStatus = document.getElementById('agent-status');
    const typingIndicator = document.getElementById('typing-indicator');
    const cmdButtons = document.querySelectorAll('.cmd');


    /**
    * Message pattern - Centralizes all message creation logic and type inference
    * - Infer message type from sender and content
    * - Create properly styled DOM elements and append it to chat box
    */
    const Message = {
      /**
       * method that creates and displays a message
       * @param {string} sender - who sent the message
       * @param {string} text - message content
       * @param {string|null} explicitType - override auto-detection (optional)
       * @returns {object} {type, element} - message type and DOM element
       */
      create(sender, text, explicitType = null) {
        // Use explicit type if provided, otherwise infer from sender/content
        let type = explicitType || this._inferType(sender, text);
        
        // Create the DOM element
        const msgEl = this._createDOM(sender, text, type);
        
        chatBox.appendChild(msgEl);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        return { type, element: msgEl };
      },

      /**
       * Infers message type based on sender name and content
       * @param {string} sender - sender identifier
       * @param {string} text - message content
       * @returns {string} - message type: 'user'|'agent'|'system'|'warning'|'error'
       */
      _inferType(sender, text) {
        const senderLower = (sender || '').toLowerCase();
        const textLower = (text || '').toLowerCase();

        // For 'system' sender, infer type from content
        if (senderLower === 'system') {
          if (textLower.includes('error:')) return 'error';
          if (textLower.includes('warning:')) return 'warning';
          return 'system';
        }

        if (senderLower === 'me' || senderLower === 'user') return 'user';
        
        return 'agent'; // default
      },

      /**
       * Creates the DOM structure for a message
       * System-level messages: centered bubble only
       * User/Agent messages: sender name + bubble
       * @param {string} sender - sender name/identifier
       * @param {string} text - message text
       * @param {string} type - message type (applies CSS class)
       * @returns {HTMLElement} - complete message element
       */
      _createDOM(sender, text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;

        // System messages
        if (type === 'system' || type === 'error' || type === 'warning') {
          const bubble = document.createElement('div');
          bubble.className = 'msg-bubble';
          bubble.textContent = text;
          div.appendChild(bubble);
        } else {
          // User/Agent
          const senderDiv = document.createElement('div');
          senderDiv.className = 'msg-sender';
          senderDiv.textContent = sender;

          const bubble = document.createElement('div');
          bubble.className = 'msg-bubble';
          bubble.textContent = text;

          div.appendChild(senderDiv);
          div.appendChild(bubble);
        }

        return div;
      }
    };

    // Unified interface for adding messages to chat
    function handleMessage(sender, text, type = null) {
      Message.create(sender, text, type);
    }

    let typingTimeout = null;

    // Display typing indicator with 120-second auto-hide timeout
    // Called when user sends a message
    function showTyping() {
      typingIndicator.classList.add('visible');
      chatBox.scrollTop = chatBox.scrollHeight;
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(function () {
        hideTyping();
        sendBtn.disabled = false;
        input.focus();
      }, 120000);
    }

    // Hide typing indicator and clear any pending timeout
    // Called only when agent or error message arrives
    function hideTyping() {
      typingIndicator.classList.remove('visible');
      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
    }

    // Handle initial connection to Socket.IO server
    // Check if agent is already running, or start it
    socket.on('connect', function() {
      console.log('[chat] Connected, joining lobby and checking agent...');
      
      // Emitting pid, order and nextUrl for logging
      socket.emit('chat:join', { 
        room: 'lobby',
        pid: pid,
        order: order,
        phase: currentPhase
      });

      // Check if agent is already active to avoid redundant startup
      fetch('/agent/status')
        .then(r => r.json())
        .then(data => {
          if (data.running) {
            // Agent already running: skip startup and enable UI
            console.log('[agent] Agent already running, skip start');
            setAgentReady();
          } else {
            // Agent not running: start it
            console.log('[agent] Starting agent...');
            socket.emit('agent:start', { context: 'chat-start' });
            handleMessage('system','⏳ Please wait — the AI agent is starting up. Send will be enabled shortly.');
          }
        })
        .catch(err => {
          // Fetch failed: fallback to starting agent
          console.warn('[agent/status] Fetch failed, assume not running');
          socket.emit('agent:start', { context: 'chat-start-fallback' });
          handleMessage('system','⏳ Please wait — the AI agent is starting up. Send will be enabled shortly.');
        });
    });
    
    socket.on('chat:joined', function(data) {
      console.log('Joined chat room:', data.room);
      //handleMessage('system', 'You joined the chat lobby.');
    });

    // Agent ready event: enable sending
    socket.on('agent:chat_ready', setAgentReady);

    function setAgentReady() {
      agentStatus.textContent = '🟢 Agent ready to chat!';
      agentStatus.className = 'ready';
      contBtn.disabled = false;
      sendBtn.disabled = false;
      handleMessage('system','Agent is ready! You can now send messages.');
      input.focus();
    }

    // Handle incoming messages from agent or system
    socket.on('chat:message', function(payload) {
      const msg = (payload && payload.message) || '';
      const sender = (payload && payload.sender) || 'partner';

      // Infer message type to decide on typing indicator behavior
      const msgType = Message._inferType(sender, msg);
      
      // Only hide typing for agent responses or errors
      // Allow typing to persist through warnings and system messages
      if (msgType === 'agent' || msgType === 'error') {
        hideTyping();
        sendBtn.disabled = false;
        input.focus();
      }
      // For warning/system/KQML: keep typing indicator visible

      // Display the message
      handleMessage(sender, msg, msgType);
    });

    // Handle user message submission (Enter key or Send button click)
    function send() {
      const msg = (input.value || '').trim();
      if (!msg) return;
      socket.emit('chat:send', {sender: 'user', message: msg});
      handleMessage('me', msg);
      input.value = '';
      input.focus();
      if (agentStatus.classList.contains('ready')) {
        showTyping();
        sendBtn.disabled = true;
      }
    }

    // Asynchronously loads chat command suggestions from a JSON configuration file.
    // Filters and renders commands based on the current phase (pre_game, post_game).
    async function loadCommands() {
      const container = document.getElementById('commands-dynamic-list');
      try {
        // Fetch the configuration file
        const response = await fetch('/static/json/chat_commands.json');
        const data = await response.json();
        
        // Check if the current phase is defined in the configuration.
        if (currentPhase === 'unknown' || !data.phases[currentPhase]) {
          console.warn("Phase unknown or not found in JSON, using default.");
          container.innerHTML = '<p style="font-size:12px; color:var(--muted);">No suggestions available for this phase.</p>';
          return;
        }

        // Retrieve the list of allowed categories for the current phase (e.g., ["Ask", "AskHow", "Tell"])
        const allowedCategories = data.phases[currentPhase];

        // Clear the loading placeholder
        container.innerHTML = ''; 

        // Iterate through each allowed category to build the UI sections
        allowedCategories.forEach(category => {
          // Filter the global command list to find prompts matching the current category
          const prompts = data.commands
            .filter(cmd => cmd.category === category)
            .map(cmd => cmd.prompt);

          // Only create a section if there are prompts available for this category
          if (prompts.length > 0) {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'helper-section';
            // Set the category title (e.g., ASK, ASKHOW, Tell)
            sectionDiv.innerHTML = `<h6>${category}</h6>`;

            // Create a clickable button for each prompt
            prompts.forEach(promptText => {
              const btn = document.createElement('button');
              btn.className = 'cmd';
              btn.textContent = promptText;
              
              // When clicked, the prompt is copied into the chat input field
              btn.addEventListener('click', () => {
                input.value = promptText;
                input.focus();
              });
              sectionDiv.appendChild(btn);
            });
            
            // Append the completed section to the helper pane
            container.appendChild(sectionDiv);
          }
        });
      } catch (err) {
        console.error("Error loading commands:", err);
        container.innerHTML = '<p style="color:red">Error loading commands.</p>';
      }
    }

    // Initialize the command helper as soon as the page script runs
    loadCommands();

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    
    contBtn.addEventListener('click', function() {
      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
