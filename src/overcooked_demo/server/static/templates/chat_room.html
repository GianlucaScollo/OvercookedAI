<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Room</title>
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f172a; --text:#e2e8f0; --muted:#94a3b8; --a1:#22d3ee; --a2:#a78bfa; --panel:rgba(255,255,255,.06); --panel-brd:rgba(255,255,255,.15); }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .wrap { max-width: 1100px; margin: 28px auto 48px; padding: 0 14px; }
    h1 { text-align:center; font-weight:800; letter-spacing:-.01em; margin-bottom:18px; }
    .card-pane { background: var(--panel); border: 1px solid var(--panel-brd); border-radius: 14px; padding: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 14px; }
    @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } }
    #chat-box { height: 58vh; overflow-y:auto; background: rgba(2,6,23,.35); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: .75rem; }
    .msg { margin-bottom: .35rem; font-size: 14px; line-height: 1.35; }
    .me { font-weight: 700; }
    .input-row { display:flex; gap:10px; margin-top:10px; }
    #chat-input { flex:1; border-radius:12px; border:1px solid rgba(255,255,255,.2); background:rgba(2,6,23,.45); color:var(--text); padding:10px 12px; }
    .btn-send { background:linear-gradient(90deg,var(--a1),var(--a2)); border:0; border-radius:12px; padding:10px 16px; font-weight:700; color:#081223; }
    .helper h5 { font-weight:700; margin-bottom:8px; }
    .helper .cmd { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:14px; color:var(--muted); }
    .footer-actions { text-align:right; margin-top: 12px; }
    .btn-next { background:linear-gradient(90deg,var(--a1),var(--a2)); border:0; border-radius:12px; padding:10px 16px; font-weight:700; color:#081223; }
    /* agent-status */
    #agent-status { font-size:13px; color: var(--muted); margin-bottom: 10px; text-align: center; }
    #agent-status.ready { color: #4ade80; }
    #agent-status.connecting { color: #facc15; }
    /* Typing indicator */
    .typing-indicator { font-size: 13px; color: var(--muted); font-style: italic; padding: 4px 6px; display: none; }
    .typing-indicator.visible { display: block; }
    /* System message (info to the user) */
    .msg.system-info { color: var(--muted); font-style: italic; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chat Room</h1>

    <!-- visual indicator of agent status -->
    <p id="agent-status" class="connecting">⏳ Connecting to agent…</p>

    <div class="grid">
      <div class="card-pane">
        <div id="chat-box" aria-live="polite"></div>

        <!-- Typing indicator -->
        <div id="typing-indicator" class="typing-indicator">staychef is typing…</div>

        <div class="input-row">
          <input id="chat-input" type="text" placeholder="Type your message…" autocomplete="off">
          <button id="sendBtn" class="btn-send" disabled>Send</button>
        </div>

        <div class="footer-actions">
          <button id="continueBtn" class="btn-next" disabled>Continue</button>
        </div>
      </div>

      <aside class="card-pane helper">
        <h5>If unsure, use the following commands</h5>
        <div class="cmd">Command 1 — brief explanation.</div>
        <div class="cmd">Command 2 — brief explanation.</div>
        <div class="cmd">Command 3 — brief explanation.</div>
        <div class="cmd">Command 4 — brief explanation.</div>
        <div class="cmd">Command 5 — brief explanation.</div>
      </aside>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>

  <script>
    const u = new URL(window.location.href);
    const pid = u.searchParams.get('pid') || '';
    const order = u.searchParams.get('order') || 'route1';
    const nextUrl = u.searchParams.get('next') || '/';

    // Socket.IO client
    const socket = io()

    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('chat-input');
    const sendBtn = document.getElementById('sendBtn');
    const contBtn = document.getElementById('continueBtn');
    const agentStatus = document.getElementById('agent-status');
    const typingIndicator = document.getElementById('typing-indicator');

    function appendMsg(sender, text) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<span class="${sender === 'me' ? 'me' : ''}">${sender}:</span> ${text}`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    function appendSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg system-info';
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    let typingTimeout = null;

    function showTyping() {
      typingIndicator.classList.add('visible');
      chatBox.scrollTop = chatBox.scrollHeight;
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(function () {
        hideTyping();
        sendBtn.disabled = false;
        input.focus();
      }, 30000);
    }

    function hideTyping() {
      typingIndicator.classList.remove('visible');
      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
    }

    socket.on('connect', function() {
      console.log('[chat] Connected, joining lobby and checking agent...');
      socket.emit('chat:join', { room: 'lobby' });

      // Check if agent is already active
      fetch('/agent/status')
        .then(r => r.json())
        .then(data => {
          if (data.running) {
            console.log('[agent] Agent already running, skip start');
            agentStatus.textContent = '🟢 Agent ready to chat!';
            agentStatus.className = 'ready';
            contBtn.disabled = false;
            sendBtn.disabled = false;
            appendSystemMsg('Agent is ready! You can now send messages.');
            input.focus();
          } else {
            console.log('[agent] Starting agent...');
            socket.emit('agent:start', { context: 'chat-start' });
            appendSystemMsg('⏳ Please wait — the AI agent is starting up. Send will be enabled shortly.');
          }
        })
        .catch(err => {
          console.warn('[agent/status] Fetch failed, assume not running');
          socket.emit('agent:start', { context: 'chat-start-fallback' });
          appendSystemMsg('⏳ Please wait — the AI agent is starting up. Send will be enabled shortly.');
        });
    });
    
    socket.on('chat:joined', function(data) {
      console.log('Joined chat room:', data.room);
      //appendMsg('system', 'You joined the chat lobby.');
    });

    socket.on('agent:chat_ready', function() {
        agentStatus.textContent = '🟢 Agent ready to chat!';
        agentStatus.className = 'ready';
        contBtn.disabled = false;
        sendBtn.disabled = false;
        appendSystemMsg('Agent is ready! You can now send messages.');
        input.focus();
    });

    socket.on('chat:message', function(payload) {
      const msg = (payload && payload.message) || '';
      const sender = (payload && payload.sender) || 'partner';
      hideTyping();
      sendBtn.disabled = false;
      input.focus();
      if (sender.toLowerCase() === 'system')
        appendSystemMsg(msg);
      else
        appendMsg(sender, msg);
    });

    function send() {
      const msg = (input.value || '').trim();
      if (!msg) return;
      socket.emit('chat:send', {sender: 'user', message: msg});
      appendMsg('me', msg);
      input.value = '';
      input.focus();
      if (agentStatus.classList.contains('ready')) {
        showTyping();
        sendBtn.disabled = true;
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    
    contBtn.addEventListener('click', function() {
      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
