<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Overcooked Symbolic AI</title>

    <!-- 👇 This line ensures static paths resolve correctly no matter the sub-URL -->
    <base href="/">

    <!-- CDNs -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
            crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.23.0/dist/phaser.min.js"></script>

    <!-- Local assets -->
    <script src="/static/lib/jquery-min.js" type="text/javascript"></script>
    <script src="/static/lib/d3.v3.min.js" type="text/javascript"></script>
    <script src="/static/lib/babel.min.js" type="text/javascript"></script>
    <script src="/static/js/graphics.js" type="text/javascript"></script>
    <script src="/static/js/index.js" type="text/javascript"></script>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css" type="text/css" />
    <link rel="stylesheet" href="/static/css/style.css" type="text/css" />
  </head>
  <body>
    <div class="container my-3">
      <h1 class="text-center">Design and Implementation of Human-AI Cooperation in a Video Game</h1>
    </div>
    
    <!-- Config form (hidden if locked) -->
    <form>
      <div class="container mt-3">
        <div class="row text-center">
          <div class="form-group col-lg-3">
            <label for="playerZero" style="color:#1E6A9E">Player 1</label>
            <select class="form-control" id="playerZero" name="playerZero">
              <option value="human">Human Keyboard Input</option>
            </select>
          </div>
          <div class="form-group col-lg-3">
            <label for="playerOne" style="color:#44956B">Player 2</label>
            <select class="form-control" id="playerOne" name="playerOne">
              <option value="human">Human Keyboard Input</option>
            </select>
          </div>
          <div class="form-group col-lg-2">
            <label for="layout">Layout</label>
            <select class="form-control" id="layout" name="layout">
              {% for layout in layouts %}
                <option value="{{ layout }}">{{ layout }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group col-lg-2">
            <label for="gameTime">Game Length (sec)</label>
            <input type="number" id="gameTime" value="60" min="1" max="1800" name="gameTime" class="form-control">
          </div>
          <div class="form-group col-lg-2">
            <label for="dataCollection"
                   data-toggle="tooltip" data-placement="top"
                   title="Whether to store the trajectories of both agents that will participate in this game">
              Collect Data?
            </label>
            <input type="checkbox" id="dataCollection" name="dataCollection" checked>
          </div>
        </div>
      </div>
    </form>

    <!-- Game container -->
    <div id="overcooked-container" class="text-center">
      <h4 id="game-title" style="display:none">Game in Progress</h4>
      <h4 id="game-over" style="display:none">Game Over</h4>
      <div id="overcooked" style="background:white; padding:10px; display:inline-block;"></div>
      <div id="error-exit" style="display:none">
        Game ended unexpectedly (probably due to another user disconnecting)
      </div>
    </div>

    <!-- Control buttons -->
    <div id="control" class="text-center mb-3">
      <button id="create" class="btn btn-primary">Create Game</button>
      <button id="join" class="btn btn-secondary">Join Existing Game</button>
      <button id="survey" onclick="window.location.href='/post-questionnaire'">Continue Survey</button>
      <button id="leave" style="display:none;" class="btn btn-danger">Leave</button>
    </div>

    <!-- Waiting banner -->
    <div id="waiting" class="text-center" style="display:none; margin: 18px 0;">
      <h4>Waiting for the other player to join…</h4>
    </div>

    <noscript>
      <h1>Warning: Javascript seems to be disabled</h1>
      <p>This website requires that Javascript be enabled on your browser.</p>
      <p>Instructions for enabling Javascript in your browser can be found 
         <a href="http://support.google.com/bin/answer.py?hl=en&answer=23852">here</a></p>
    </noscript>

    <!-- Server vars -->
    <script type="application/json" id="server-config">
{{ {
  "locked_layout": locked_layout|default(None),
  "locked_time": locked_time|default(None),
  "auto_join": auto_join|default(False),
  "next_url": next_url|default(None)
}|tojson }}
    </script>

    <!-- Page logic -->
    <script>
      // Parse server flags
      (function () {
        try {
          const cfg = JSON.parse(document.getElementById('server-config').textContent || '{}');
          window.LOCKED_LAYOUT = cfg.locked_layout ?? null;
          window.LOCKED_TIME   = cfg.locked_time  ?? null;
          window.NEXT_URL      = cfg.next_url     ?? null;
        } catch (e) {
          window.LOCKED_LAYOUT = null;
          window.LOCKED_TIME   = null;
          window.NEXT_URL      = null;
        }
      })();

      function withSocket(fn) {
        const start = Date.now();
        const t = setInterval(function () {
          if (window.socket && typeof window.socket.emit === 'function') {
            clearInterval(t); fn(window.socket);
          } else if (Date.now() - start > 4000) {
            clearInterval(t); console.warn('Socket not ready');
          }
        }, 50);
      }

      // Waiting/start UI hooks
      (function hookWaitingUI() {
        const waitEl = document.getElementById('waiting');
        const gameWrap = document.getElementById('overcooked-container');
        const t = setInterval(function () {
          if (!window.socket) return;
          clearInterval(t);
          window.socket.on('waiting', function () {
            waitEl.style.display = 'block';
            gameWrap.style.display = 'none';
          });
          window.socket.on('start_game', function () {
            waitEl.style.display = 'none';
            gameWrap.style.display = 'block';
          });
        }, 50);
      })();

      // Helper to append pid/order to URLs
      function appendParams(url, pid, order) {
        const u = new URL(url, window.location.origin);
        if (pid)   u.searchParams.set('pid', pid);
        if (order) u.searchParams.set('order', order);
        return u.pathname + (u.search ? u.search : '');
      }

      document.addEventListener('DOMContentLoaded', function () {
        const here  = new URL(window.location.href);
        const pid   = here.searchParams.get('pid')   || '';
        const order = here.searchParams.get('order') || '';

        if (window.NEXT_URL) {
          const surveyBtn = document.getElementById('survey');
          if (surveyBtn) {
            surveyBtn.onclick = function (e) {
              e.preventDefault();
              const target = appendParams(window.NEXT_URL, pid, order);
              window.location.href = target;
            };
          }
        }

        if (window.LOCKED_LAYOUT) {
          document.getElementById('layout').value = window.LOCKED_LAYOUT;
          document.getElementById('layout').disabled = true;
          if (window.LOCKED_TIME) {
            document.getElementById('gameTime').value = window.LOCKED_TIME;
            document.getElementById('gameTime').disabled = true;
          }
          document.querySelector('form .container').style.display = 'none';
        }

        // Remove old handlers from index.js
        if (window.jQuery) {
          jQuery('#create').off('click');
          jQuery('#join').off('click');
        }

        function params() {
          const layout = window.LOCKED_LAYOUT || document.getElementById('layout').value || 'cramped_room';
          const time = parseInt(window.LOCKED_TIME || document.getElementById('gameTime').value || 60, 10);
          return {
            playerZero: 'human',
            playerOne:  'human',
            dataCollection: 'on',
            gameTime: time,
            layout: layout,
            layout_name: layout,
            layouts: [layout]
          };
        }

        function showWaiting() {
          document.getElementById('waiting').style.display = 'block';
          document.getElementById('overcooked-container').style.display = 'none';
        }

        document.getElementById('create').addEventListener('click', function (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
          const p = params();
          withSocket(function (s) {
            s.emit('join', { game_name: 'overcooked', create_if_not_found: true, params: p });
          });
          showWaiting();
        });

        document.getElementById('join').addEventListener('click', function (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
          const p = params();
          withSocket(function (s) {
            s.emit('join', { game_name: 'overcooked', create_if_not_found: false, params: p });
          });
          showWaiting();
        });
      });
    </script>
  </body>
</html>
