<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Survey</title>
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f172a;--text:#e2e8f0;--muted:#94a3b8;--a1:#22d3ee;--a2:#a78bfa;--panel:rgba(255,255,255,.06);--brd:rgba(255,255,255,.12)}
    html,body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100%}
    .wrap{max-width:960px;margin:28px auto 48px;padding:0 14px}
    h1{font-weight:800;letter-spacing:-.01em;margin-bottom:6px;text-align:center}
    p.sub{color:var(--muted);text-align:center;margin-bottom:14px}
    .pid{background:var(--panel);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;display:inline-block;margin:0 auto 12px;font-weight:600}
    .card{background:var(--panel);border:1px solid var(--brd);border-radius:14px;padding:16px}
    .btn-cta{background:linear-gradient(90deg,var(--a1),var(--a2));border:0;border-radius:12px;padding:12px 18px;font-weight:700;color:#081223;cursor:pointer;width:100%}
    .btn-cta:disabled{opacity:0.5;cursor:not-allowed}
    /* Form styles */
    .form-group{margin-bottom:20px}
    .form-group.hidden{display: none;}
    .form-label{font-weight:600;margin-bottom:8px;display:block;color:var(--text)}
    .form-control{background:rgba(2,6,23,.45);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:var(--text);padding:10px 12px}
    .form-control:focus{border-color:var(--a1);background:rgba(2,6,23,.45);color:var(--text);box-shadow:0 0 0 2px rgba(34,211,238,.1)}
    #surveyForm {margin-top: 16px;}
    /* Radio group styles */
    .radio-group{display:flex;flex-direction:column;gap:12px}
    .radio-item{display:flex;align-items:center;padding:10px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.12);transition:all 0.2s}
    .radio-item:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.03)}
    .radio-item input{margin-right:10px;cursor:pointer}
    /* Status messages */
    .status-message{padding:12px;margin-bottom:24px;border-radius:8px;font-size:14px;display:none}
    .status-message.info{background:rgba(34,211,238,.15);color:#22d3ee;border:1px solid rgba(34,211,238,.3);display:block}
    .status-message.success{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3);display:block}
    .status-message.error{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);display:block}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="surveyTitle">Survey</h1>
    <p class="sub" id="surveySubtitle">Please complete this survey</p>
    <div class="text-center"><span id="pid" class="pid"></span></div>

    <div class="card">
      <!-- Survey Form -->
      <form id="surveyForm">
        <!-- question 1 -->
        <div class="form-group" data-question-num="1">
          <label class="form-label">1. How well did the agent collaborate with you?</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="q1" value="VeryBadly" required> Very badly
            </label>
            <label class="radio-item">
              <input type="radio" name="q1" value="Badly"> Badly
            </label>
            <label class="radio-item">
              <input type="radio" name="q1" value="Average"> Average
            </label>
            <label class="radio-item">
              <input type="radio" name="q1" value="Well"> Well
            </label>
            <label class="radio-item">
              <input type="radio" name="q1" value="VeryWell"> Very well
            </label>
          </div>
        </div>
        
        <!-- question 2 -->
        <div class="form-group" data-question-num="2">
        <label class="form-label">2. Who do you think was the better collaborator?</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="q2" value="Me" required> Me
            </label>
            <label class="radio-item">
              <input type="radio" name="q2" value="TheAgent"> The agent
            </label>
            <label class="radio-item">
              <input type="radio" name="q2" value="Both"> Both
            </label>
          </div>
        </div>
        
        <!-- question 3 -->
        <div class="form-group" data-question-num="3">
          <label class="form-label">3. How satisfied were you with the explanations given by the agent?</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="q3" value="VeryDissatisfied" required> Very dissatisfied
            </label>
            <label class="radio-item">
              <input type="radio" name="q3" value="Dissatisfied"> Dissatisfied
            </label>
            <label class="radio-item">
              <input type="radio" name="q3" value="Neither"> Neither satisfied nor dissatisfied
            </label>
            <label class="radio-item">
              <input type="radio" name="q3" value="Satisfied"> Satisfied
            </label>
            <label class="radio-item">
              <input type="radio" name="q3" value="VerySatisfied"> Very satisfied
            </label>
          </div>
        </div>

        <!-- question 4 -->
        <div class="form-group" data-question-num="4">
          <label class="form-label">4. How effective was the pre-game discussion of the cooperation strategies?</label>
          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="q4" value="CooperationWorsened" required> Cooperation worsened
            </label>
            <label class="radio-item">
              <input type="radio" name="q4" value="NothingChanged"> Nothing changed
            </label>
            <label class="radio-item">
              <input type="radio" name="q4" value="CooperationImproved"> Cooperation improved
            </label>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-cta">Submit Survey</button>
      </form>
      <!-- Status Message -->
      <div id="statusMessage" class="status-message"></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
  <script>
    const u = new URL(window.location.href);
    const pid = u.searchParams.get('pid') || '';
    const order = u.searchParams.get('order') || 'route1';
    const surveyNum = parseInt('{{ n }}' || '1');
    const nextUrl = u.searchParams.get('next') || '/';

    // set title and subtitle
    const titles = {
      1: { title: "Survey 1", subtitle: "Thanks! Continue to the next block." },
      2: { title: "Survey 2", subtitle: "Thanks! Continue to the next block." },
      3: { title: "Survey 3", subtitle: "Short check-in before the final round." },
      4: { title: "Survey 4", subtitle: "Final quick questions. Thanks for participating!" }
    };

    const surveyInfo = titles[surveyNum] || { title: "Survey", subtitle: "Please complete" };
    document.getElementById('surveyTitle').textContent = surveyInfo.title;
    document.getElementById('surveySubtitle').textContent = surveyInfo.subtitle;
    document.getElementById('pid').textContent = pid ? `Participant ID: ${pid}` : '';

    console.log(`[Survey] Loading survey_${surveyNum} for ${order}`);

    // visiility logic
    const VISIBILITY = {
      route1: {              // route1
        1: [1, 2],           // survey 1: Q1, Q2
        2: [1, 2, 3, 4],     // survey 2: Q1, Q2, Q3, Q4
        3: [1, 2],           // survey 3: Q1, Q2
        4: [1, 2, 3, 4]      // survey 4: Q1, Q2, Q3, Q4
      },
      route2: {              // route2
        1: [1, 2, 3, 4],     // survey 1: Q1, Q2, Q3, Q4
        2: [1, 2],           // survey 2: Q1, Q2
        3: [1, 2, 3, 4],     // survey 3: Q1, Q2, Q3, Q4
        4: [1, 2]            // survey 4: Q1, Q2
      }
    };

    const visibleQuestions = VISIBILITY[order]?.[surveyNum] || [1, 2];

    console.log(`[Survey] Show questions: ${visibleQuestions.join(', ')}`);

    // Show/hide based on the list
    document.querySelectorAll('[data-question-num]').forEach(q => {
      const qNum = parseInt(q.getAttribute('data-question-num'));
      
      if (visibleQuestions.includes(qNum)) {
        q.classList.remove('hidden');
        // inputs required when visible
        q.querySelectorAll('input').forEach(inp => inp.required = true);
        console.log(`  Q${qNum}: VISIBLE`);
      } else {
        q.classList.add('hidden');
        q.querySelectorAll('input').forEach(inp => inp.required = false);
        console.log(`  Q${qNum}: HIDDEN`);
      }
    });

    function showMessage(message, type = 'info') {
      const el = document.getElementById('statusMessage');
      el.className = `status-message ${type}`;
      el.textContent = message;
    }

    // API submission
    async function submitSurveyData(surveyData) {
      try {
        const response = await fetch('/api/survey/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(surveyData)
        });

        const result = await response.json();
        console.log('[API Response]:', result);

        return result.status === 'ok';
      } catch (error) {
        console.error('[API Error]:', error);
        return false;
      }
    }

    // surveyForm submission handler
    document.getElementById('surveyForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const responses = {};
      visibleQuestions.forEach(qNum => {
        const input = document.querySelector(`input[name="q${qNum}"]`);
        if (input && input.value) {
          responses[`q${qNum}`] = input.value;
        }
      });

      const surveyData = {
        pid: pid,
        route: order,
        survey_type: `survey_${surveyNum}`,
        responses: responses
      };

      console.log('[Survey Submission]:', surveyData);
      showMessage('Submitting survey...', 'info');

      // Submit to backend
      const success = await submitSurveyData(surveyData);

      if (success) {
        showMessage('Survey submitted! Redirecting...', 'success');
        document.getElementById('surveyForm').style.opacity = '0.5';
        document.getElementById('surveyForm').style.pointerEvents = 'none';
        
        setTimeout(() => {
        window.location.href = nextUrl;
        }, 2000);
      } else {
        showMessage('Failed to submit survey. Please try again.', 'error');
      }
    });

    // shutdown agent on survey page
    if (typeof io !== 'undefined') {
      const sock = io();
      
      sock.on('connect', function() {
        console.log(`[survey${surveyNum}] Socket connected - emitting agent:shutdown...`);
        sock.emit('agent:shutdown', { context: `survey${surveyNum}-page` });
      });

      setTimeout(function() {
        if (sock.connected) {
          sock.disconnect();
        }
      }, 2000);
    }
  </script>
</body>
</html>
