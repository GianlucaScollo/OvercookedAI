<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Survey 3</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f172a;--text:#e2e8f0;--muted:#94a3b8;--a1:#22d3ee;--a2:#a78bfa;--panel:rgba(255,255,255,.06);--brd:rgba(255,255,255,.12)}
    html,body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100%}
    .wrap{max-width:960px;margin:28px auto 48px;padding:0 14px}
    h1{font-weight:800;letter-spacing:-.01em;margin-bottom:6px;text-align:center}
    p.sub{color:var(--muted);text-align:center;margin-bottom:14px}
    .pid{background:var(--panel);border:1px solid var(--brd);border-radius:10px;padding:8px 12px;display:inline-block;margin:0 auto 12px; font-weight:600}
    .card{background:var(--panel);border:1px solid var(--brd);border-radius:14px;padding:16px}
    iframe{width:100%;min-height:560px;border:0;border-radius:12px;background:#fff}
    .btn-cta{background:linear-gradient(90deg,var(--a1),var(--a2));border:0;border-radius:12px;padding:12px 18px;font-weight:700;color:#081223}
    .footer{text-align:right;margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Survey 3</h1>
    <p class="sub">Short check-in before the final round.</p>
    <div class="text-center"><span id="pid" class="pid"></span></div>

    <div class="card">
      <iframe id="formFrame" src="" allowfullscreen></iframe>
      <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" id="consentCheck">
        <label class="form-check-label" for="consentCheck">
          I confirm i have completed the survey 3.
        </label>
      </div>
      <div class="footer">
        <button id="continue" class="btn-cta">Continue</button>
      </div>
    </div>
  </div>

  <script>
    const u = new URL(window.location.href);
    const pid = u.searchParams.get('pid') || '';
    const order = u.searchParams.get('order') || 'route1';
    const nextUrl = u.searchParams.get('next') || '/';
    
    document.getElementById('pid').textContent = pid ? `Participant ID: ${pid}` : '';

    const formUrls = {
      'route1': 'https://forms.office.com/Pages/ResponsePage.aspx?id=JbCH58Y_AkiHSpyYh2j4kgFa8Kcsj6dCsld_68bJub9UQkxXUUhWSVpUVUI1S0Y1UUw5TkRKQ1pNMi4u',
      'route2': 'https://forms.office.com/Pages/ResponsePage.aspx?id=JbCH58Y_AkiHSpyYh2j4kgFa8Kcsj6dCsld_68bJub9UNzIxVlY1S1NBTEI5QzlIVTMwVVVIRlpBRy4u'
    };

    const formUrl = formUrls[order] || formUrls['route1'];
    document.getElementById('formFrame').src = formUrl;

    const consentCheck = document.getElementById('consentCheck');
    const continueBtn = document.getElementById('continue');

    const updateButton = () => { continueBtn.disabled = !consentCheck.checked; };
    consentCheck.addEventListener('change', updateButton);
    updateButton();

    continueBtn.addEventListener('click', function(e) {
      if (!consentCheck.checked) {
        e.preventDefault();
        alert('Please complete the survey before continuing.');
        return;
      }
      window.location.href = nextUrl;
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
  <script>
    (function() {
      const sock = io();

      sock.on('connect', function() {
        console.log('[survey3] Socket connected - emitting agent:shutdown...');
        sock.emit('agent:shutdown', { context: 'survey3-page' });
      });

      setTimeout(function() {
        if (sock.connected) {
          sock.disconnect();
        }
      }, 2000);
    })();
  </script>
</body>
</html>
