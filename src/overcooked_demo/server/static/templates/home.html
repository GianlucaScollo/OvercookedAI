<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Human-AI Cooperation</title>

  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root { --bg1:#0f172a; --bg2:#1e293b; --accent:#22d3ee; --accent2:#a78bfa; --text:#e2e8f0; --muted:#94a3b8; --glass:rgba(255,255,255,.06); --glass-brd:rgba(255,255,255,.12); }
    html, body { height:100%; background:linear-gradient(135deg,var(--bg1),var(--bg2)); color:var(--text); font-family:'Inter',system-ui,sans-serif; }
    .hero { min-height:100vh; display:grid; place-items:center; position:relative; overflow:hidden; padding:2rem; }
    .orb { position:absolute; border-radius:9999px; filter:blur(60px); opacity:.35; pointer-events:none; animation:float 18s ease-in-out infinite; }
    .orb.a { width:420px; height:420px; background:radial-gradient(circle,var(--accent),transparent 60%); top:-80px; left:-60px; }
    .orb.b { width:520px; height:520px; background:radial-gradient(circle,var(--accent2),transparent 60%); bottom:-120px; right:-100px; animation-delay:6s; }
    @keyframes float { 0%,100%{transform:translateY(0) translateX(0)} 50%{transform:translateY(18px) translateX(10px)} }
    .card-glass { width:min(720px,92vw); border-radius:20px; padding:28px; background:linear-gradient(180deg,var(--glass),rgba(255,255,255,.02)); border:1px solid var(--glass-brd); box-shadow:0 30px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05); backdrop-filter:blur(14px); }
    .title { font-weight:800; font-size:clamp(28px,4.2vw,44px); line-height:1.1; letter-spacing:-.02em; background:linear-gradient(90deg,var(--text),#fff); -webkit-background-clip:text; background-clip:text; color:transparent; text-align:center; margin-bottom:8px; }
    .subtitle { text-align:center; color:var(--muted); font-size:15px; margin-bottom:22px; }
    .consent-area { background:rgba(2,6,23,.35); border:1px dashed rgba(148,163,184,.35); border-radius:16px; padding:16px; margin-top:10px; }
    .btn-cta { display:inline-flex; align-items:center; justify-content:center; gap:10px; width:100%; height:54px; border-radius:14px; border:0; color:#0b1220; font-weight:700; letter-spacing:.2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:transform .08s ease, box-shadow .2s ease, opacity .2s ease; box-shadow:0 10px 30px rgba(34,211,238,.25); }
    .btn-cta:disabled { opacity:.55; cursor:not-allowed; box-shadow:none; }
    .btn-cta:not(:disabled):hover { transform:translateY(-1px); box-shadow:0 16px 40px rgba(167,139,250,.28); }
    .footer-note { text-align:center; color:var(--muted); font-size:12px; margin-top:14px; }
  </style>
</head>
<body>
  <main class="hero">
    <div class="orb a"></div>
    <div class="orb b"></div>

    <section class="card-glass">
      <h1 class="title">Human-AI Cooperation</h1>
      <p class="subtitle">Welcome! Before entering, please confirm your consent.</p>

      <div class="consent-area">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="agree" id="consentCheck">
          <label class="form-check-label" for="consentCheck">
            I have read and agree with the consent form provided to me.
          </label>
        </div>
      </div>

      <div class="mt-3">
        <button id="goGame" class="btn-cta" disabled>
          <span>Go to Pre-questionnaire</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="footer-note">You’ll be redirected after confirming your consent.</div>
      </div>
    </section>
  </main>

  <script src="static/lib/jquery-min.js"></script>
  <script>
    const consentCheck = document.getElementById('consentCheck');
    const goBtn = document.getElementById('goGame');
    const updateButton = () => { goBtn.disabled = !consentCheck.checked; };
    consentCheck.addEventListener('change', updateButton);
    updateButton();

    goBtn.addEventListener('click', function(e) {
      if (!consentCheck.checked) {
        e.preventDefault();
        alert('Please agree to the consent form to continue.');
        return;
      }
      // IMPORTANT: go to /enter so the server assigns order + PID
      window.location.href = '/enter';
    });
  </script>
</body>
</html>
